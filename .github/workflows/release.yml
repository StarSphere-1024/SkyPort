  name: Release
  
  on:
    push:
      tags:
        - 'v*'
    workflow_dispatch:
  
  jobs:
    build:
      runs-on: ubuntu-latest
      outputs:
        app_version: ${{ steps.get_version.outputs.app_version }}
      steps:
        - name: Determine version
          id: get_version
          run: |
            # TODO: Replace with real version extraction logic
            echo "app_version=1.0.0" >> $GITHUB_OUTPUT
  
    release:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Download artifacts
          uses: actions/download-artifact@v4
          with:
            path: artifacts
            pattern: '*'
            merge-multiple: true

        - name: List artifacts (for debugging)
          run: ls -R artifacts

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            files: artifacts/*
            body: |
              SkyPort v${{ needs.build.outputs.app_version }} has been released

              All-platform installation packages have been automatically uploaded and can be downloaded directly.
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}