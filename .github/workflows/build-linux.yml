name: Build Linux

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
      retention-days:
        required: false
        type: number
        default: 7

permissions:
  contents: read

env:
  FLUTTER_CHANNEL: stable

jobs:
  linux:
    name: Linux Packages
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
        ff_job: [linux-deb, linux-appimage]
        include:
          - arch: x64
            runner: ubuntu-22.04
            arch_name: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            arch_name: arm64
          - ff_job: linux-deb
            pkg_suffix: -deb
          - ff_job: linux-appimage
            pkg_suffix: -appimage
    env:
      APP_VERSION: ${{ inputs.app_version }}
      ARCH_NAME: ${{ matrix.arch_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Flutter (Manual for ARM64)
        if: matrix.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter --depth 1
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH
          flutter --version
          dart --version

      - name: Setup Flutter (Standard for x64)
        if: matrix.arch != 'arm64'
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          architecture: x64

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install AppImage tool (appimagetool)
        if: matrix.ff_job == 'linux-appimage'
        run: |
          sudo apt-get install -y libfuse2 || echo "libfuse2 already present"
          # 根据架构选择下载链接
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          else
            URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          fi
          curl -L -o appimagetool.AppImage "$URL"
          chmod +x appimagetool.AppImage
          sudo mv appimagetool.AppImage /usr/local/bin/appimagetool
          appimagetool --version || echo "appimagetool installed"

      - name: Activate fastforge
        run: dart pub global activate fastforge

      - name: Download Dart/Flutter deps
        working-directory: SkyPort
        run: flutter pub get

      - name: Build (${{ matrix.ff_job }})
        working-directory: SkyPort
        run: fastforge release --name release --jobs ${{ matrix.ff_job }}

      - name: List dist
        working-directory: SkyPort
        run: ls -R dist || echo "dist missing"

      - name: Normalize deb filename
        if: matrix.ff_job == 'linux-deb'
        working-directory: SkyPort
        run: |
          mkdir -p dist/standard
          DEB_FILE=$(ls dist/release/*/*.deb 2>/dev/null | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found under dist/release/*/*.deb" >&2
            exit 1
          fi
          TARGET="dist/standard/SkyPort-v${APP_VERSION}-linux-${ARCH_NAME}.deb"
          cp "$DEB_FILE" "$TARGET"
          echo "Copied $DEB_FILE -> $TARGET"

      - name: Normalize AppImage filename
        if: matrix.ff_job == 'linux-appimage'
        working-directory: SkyPort
        run: |
          mkdir -p dist/standard
          APPIMAGE_FILE=$(ls dist/release/*/*.AppImage 2>/dev/null | head -n 1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "No .AppImage file found under dist/release/*/*.AppImage" >&2
            exit 1
          fi
          TARGET="dist/standard/SkyPort-v${APP_VERSION}-linux-${ARCH_NAME}.AppImage"
          cp "$APPIMAGE_FILE" "$TARGET"
          echo "Copied $APPIMAGE_FILE -> $TARGET"

      - name: Upload deb artifact
        if: matrix.ff_job == 'linux-deb'
        uses: actions/upload-artifact@v7
        with:
          name: SkyPort-v${{ env.APP_VERSION }}-linux-${{ matrix.arch_name }}-deb
          path: SkyPort/dist/standard/SkyPort-v${{ env.APP_VERSION }}-linux-${{ matrix.arch_name }}.deb
          retention-days: ${{ inputs.retention-days }}

      - name: Upload AppImage artifact
        if: matrix.ff_job == 'linux-appimage'
        uses: actions/upload-artifact@v7
        with:
          name: SkyPort-v${{ env.APP_VERSION }}-linux-${{ matrix.arch_name }}-appimage
          path: SkyPort/dist/standard/SkyPort-v${{ env.APP_VERSION }}-linux-${{ matrix.arch_name }}.AppImage
          retention-days: ${{ inputs.retention-days }}
