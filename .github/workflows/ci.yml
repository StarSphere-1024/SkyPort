name: CI

on:
  push:
    branches: [ main, master, dev, release ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-matrix.yml
    with:
      retention-days: 7
