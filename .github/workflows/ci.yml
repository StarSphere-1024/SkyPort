name: CI

on:
  push:
    branches: [ master, release ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  build:
    name: Build Packages
    needs: test
    uses: ./.github/workflows/build-matrix.yml
    with:
      retention-days: 7
